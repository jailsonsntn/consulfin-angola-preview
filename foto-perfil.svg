<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bgGradient)"/>
  
  <!-- Avatar circle -->
  <circle cx="300" cy="250" r="120" fill="none" stroke="#C9A84C" stroke-width="2" opacity="0.3"/>
  
  <!-- Person icon -->
  <circle cx="300" cy="180" r="50" fill="#C9A84C" opacity="0.5"/>
  <ellipse cx="300" cy="400" rx="80" ry="120" fill="#C9A84C" opacity="0.3"/>
  
  <!-- Text -->
  <text x="300" y="650" font-family="Inter, sans-serif" font-size="24" fill="#C9A84C" text-anchor="middle" opacity="0.6">Foto de Perfil</text>
  <text x="300" y="690" font-family="Inter, sans-serif" font-size="14" fill="#888888" text-anchor="middle">Substitua com sua foto</text>
</svg>
